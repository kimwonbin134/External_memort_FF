name: Build EXE Release

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # ขั้นตอนเสริม: ช่วยให้เราเห็นว่าไฟล์ .csproj อยู่ที่ไหนกันแน่
    - name: List files for debugging
      run: dir /s External.csproj

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      # สั่งให้หาไฟล์ .sln หรือ .csproj แล้ว restore เองเลย
      run: nuget restore

    - name: Build Solution
      # ใช้ wildcard ** เพื่อให้มันหาไฟล์ External.csproj ไม่ว่าจะซ่อนอยู่ที่ไหน
      run: msbuild **/External.csproj /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare Artifact
      shell: pwsh
      run: |
        if (!(Test-Path "build_output")) { mkdir build_output }
        # งมหาไฟล์ .exe และ .dll จากทุก bin/Release ที่เจอ
        Get-ChildItem -Path "**/bin/Release/" -Recurse -Include *.exe, *.dll, *.config | Copy-Item -Destination "build_output" -Force
        ls build_output

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: External-App-Output
        path: build_output/
